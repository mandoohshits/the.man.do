<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHANNEL // THE.MAN.DO</title>
  <link rel="stylesheet" href="universe.css">
  <style>
    .channel-feed {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      padding: 60px 5% 100px;
    }

    .video-post {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
    }

    .video-wrap {
      position: relative;
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      background: #000;
      border: 1px solid rgba(255,255,255,0.07);
      border-bottom: none;
      cursor: pointer;
      height: 110px;
      transition: height 0.5s cubic-bezier(0.16,1,0.3,1), border-color 0.3s;
    }

    .video-wrap.expanded {
      height: calc(720px * 9 / 16);
      border-color: rgba(240,160,20,0.25);
    }

    .video-wrap.short.expanded {
      height: calc(400px * 16 / 9);
      max-height: 80vh;
    }

    @media (max-width: 760px) {
      .video-wrap.expanded       { height: calc(90vw * 9 / 16); }
      .video-wrap.short.expanded { height: calc(60vw * 16 / 9); }
    }

    .yt-player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .video-wrap.expanded .yt-player { pointer-events: all; opacity: 1; }

    .yt-player iframe { width:100%!important; height:100%!important; border:none; display:block; }

    .video-skeleton {
      position: absolute;
      inset: 0;
      background: #090909;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      z-index: 10;
      transition: opacity 0.4s;
    }

    .video-wrap.expanded .video-skeleton { flex-direction:column; justify-content:center; padding:0; }
    .video-skeleton.hidden { opacity:0; pointer-events:none; }

    .play-trigger {
      position: relative;
      z-index: 2;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(240,160,20,0.5);
      background: rgba(6,6,6,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 0.5rem;
      color: var(--accent);
      flex-shrink: 0;
      transition: transform 0.2s, background 0.2s;
    }

    .video-wrap.expanded .play-trigger { width:52px; height:52px; font-size:0.6rem; }
    .video-wrap:hover .play-trigger    { background:rgba(240,160,20,0.15); transform:scale(1.1); }

    .skeleton-dots { position:relative; z-index:2; display:none; gap:4px; }
    .video-skeleton.loading .skeleton-dots { display:flex; }
    .video-skeleton.loading .play-trigger  { display:none; }

    .skeleton-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    .video-skeleton.loading .skeleton-dot:nth-child(1){ animation:dotPulse 1s ease-in-out infinite 0s;   }
    .video-skeleton.loading .skeleton-dot:nth-child(2){ animation:dotPulse 1s ease-in-out infinite 0.2s; }
    .video-skeleton.loading .skeleton-dot:nth-child(3){ animation:dotPulse 1s ease-in-out infinite 0.4s; }

    .skeleton-title {
      position: relative; z-index: 2;
      font-family: var(--font-mono);
      font-size: 0.58rem; letter-spacing: 4px;
      color: var(--accent); text-transform: uppercase; opacity: 0.65;
    }

    .expand-hint {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); z-index: 11;
      font-family: var(--font-mono); font-size: 0.42rem;
      letter-spacing: 2px; color: rgba(240,160,20,0.3);
      text-transform: uppercase; pointer-events: none;
    }

    .video-wrap.expanded .expand-hint { display:none; }

    /* STATUS BAR */
    .video-status-bar {
      background: rgba(6,6,6,0.97);
      border: 1px solid rgba(255,255,255,0.07);
      border-top: 1px solid rgba(240,160,20,0.06);
      border-radius: 0 0 16px 16px;
      padding: 9px 14px;
      display: flex; align-items: center;
      justify-content: space-between;
      gap: 12px; min-height: 38px;
    }

    .status-left { display:flex; align-items:center; gap:8px; }
    .buf-dots    { display:flex; gap:3px; }

    .buf-dot {
      width:4px; height:4px; border-radius:50%;
      background:var(--accent); opacity:0.12;
    }

    .vsb-idle .buf-dot    { opacity:0.1; animation:none!important; }
    .vsb-idle .buf-text   { opacity:0.2; } .vsb-idle .play-text { opacity:0; } .vsb-idle .pause-text { opacity:0; } .vsb-idle .waveform-mini { opacity:0; }

    .vsb-buffering .buf-dot:nth-child(1){ animation:dotPulse 1s ease-in-out infinite 0s;   opacity:1; }
    .vsb-buffering .buf-dot:nth-child(2){ animation:dotPulse 1s ease-in-out infinite 0.2s; opacity:1; }
    .vsb-buffering .buf-dot:nth-child(3){ animation:dotPulse 1s ease-in-out infinite 0.4s; opacity:1; }
    .vsb-buffering .buf-text { opacity:1; } .vsb-buffering .play-text { opacity:0; } .vsb-buffering .pause-text { opacity:0; } .vsb-buffering .waveform-mini { opacity:0; }

    .vsb-playing .buf-dot  { opacity:0.08; animation:none!important; }
    .vsb-playing .buf-text { opacity:0; } .vsb-playing .play-text { opacity:0.85; } .vsb-playing .pause-text { opacity:0; } .vsb-playing .waveform-mini { opacity:1; }

    .vsb-paused .buf-dot   { opacity:0.08; animation:none!important; }
    .vsb-paused .buf-text  { opacity:0; } .vsb-paused .play-text { opacity:0; } .vsb-paused .pause-text { opacity:0.5; } .vsb-paused .waveform-mini { opacity:0; }

    .buf-text, .play-text, .pause-text {
      font-family:var(--font-mono); font-size:0.5rem;
      letter-spacing:2px; text-transform:uppercase;
      transition:opacity 0.3s; white-space:nowrap;
    }
    .buf-text  { color:var(--accent); }
    .play-text { color:rgba(80,200,100,0.9); }
    .pause-text{ color:rgba(240,236,224,0.35); }

    .waveform-mini {
      display:flex; align-items:flex-end;
      gap:2px; height:13px; opacity:0; transition:opacity 0.3s;
    }
    .waveform-mini span {
      width:2px; border-radius:1px; background:var(--accent);
      animation:waveBar 0.9s ease-in-out infinite alternate;
    }
    .waveform-mini span:nth-child(1){ height:4px;  animation-delay:0s;    }
    .waveform-mini span:nth-child(2){ height:11px; animation-delay:0.12s; }
    .waveform-mini span:nth-child(3){ height:6px;  animation-delay:0.24s; }
    .waveform-mini span:nth-child(4){ height:12px; animation-delay:0.06s; }
    .waveform-mini span:nth-child(5){ height:5px;  animation-delay:0.18s; }

    .status-right { display:flex; flex-direction:column; align-items:flex-end; gap:2px; flex-shrink:0; }
    .video-post-title { font-family:var(--font-mono); font-size:0.6rem; letter-spacing:2px; color:var(--text); text-transform:uppercase; }
    .video-post-meta  { font-family:var(--font-mono); font-size:0.48rem; letter-spacing:1px; color:rgba(240,236,224,0.25); text-transform:uppercase; }

    @keyframes dotPulse { 0%,100%{ opacity:0.15; transform:scale(1); } 50%{ opacity:1; transform:scale(1.5); } }
    @keyframes waveBar  { from{ transform:scaleY(0.3); opacity:0.4; } to{ transform:scaleY(1); opacity:1; } }
  </style>

  <main class="channel-feed">

    <!--
    ════════════════════════════════════════════
    HOW TO ADD A VIDEO — 3 STEPS:

    STEP 1 — Get the YouTube ID from your link:
      Normal: youtube.com/watch?v=ZmMQv3IzdAg  → ID = ZmMQv3IzdAg
      Short:  youtube.com/shorts/euh1LBCnRAw   → ID = euh1LBCnRAw

    STEP 2 — Add one line to VIDEO_LIST in the script:
      Normal: { playerId:'yt-3', videoId:'YOUR_ID', wrapId:'wrap-3', skelId:'skel-3', barId:'bar-3' },
      Short:  { playerId:'yt-3', videoId:'YOUR_ID', wrapId:'wrap-3', skelId:'skel-3', barId:'bar-3', isShort:true },

    STEP 3 — Copy a video-post block below, change ALL numbers to 3
      wrap-1 → wrap-3 / skel-1 → skel-3 / bar-1 → bar-3 / yt-1 → yt-3
      For a Short also add class="short" on the video-wrap div
      Change the title text to match your video
    ════════════════════════════════════════════
    -->

    <!-- VIDEO 1 — normal -->
    <div class="video-post">
      <div class="video-wrap" id="wrap-1" onclick="handleClick('yt-1','wrap-1','skel-1','bar-1')">

<script>
const VIDEO_LIST = [
  { playerId:'yt-1', videoId:'ZmMQv3IzdAg',  wrapId:'wrap-1', skelId:'skel-1', barId:'bar-1' },
  { playerId:'yt-2', videoId:'euh1LBCnRAw',  wrapId:'wrap-2', skelId:'skel-2', barId:'bar-2', isShort:true },
  // ADD MORE HERE ↓
  // { playerId:'yt-3', videoId:'YOUR_ID', wrapId:'wrap-3', skelId:'skel-3', barId:'bar-3' },
];

const players = {};
const YT_STATE = { UNSTARTED:-1, ENDED:0, PLAYING:1, PAUSED:2, BUFFERING:3, CUED:5 };

function onYouTubeIframeAPIReady() {
  VIDEO_LIST.forEach(v => {
    players[v.playerId] = new YT.Player(v.playerId, {
      videoId: v.videoId,
      playerVars: { autoplay:0, controls:1, modestbranding:1, rel:0, playsinline:1, fs:1 },
      events: {
        onReady:       () => setBar(v.barId, 'idle'),
        onStateChange: (e) => onStateChange(e, v),
      }
    });
  });
}

function onStateChange(e, v) {
  const wrap = document.getElementById(v.wrapId);
  const skel = document.getElementById(v.skelId);
  const ytEl = document.getElementById(v.playerId);

  if (e.data === YT_STATE.BUFFERING) { setBar(v.barId, 'buffering'); }

  if (e.data === YT_STATE.PLAYING) {
    if (ytEl) ytEl.style.opacity = '1';
    if (skel) skel.classList.add('hidden');
    if (wrap) { if (v.isShort) wrap.classList.add('short'); wrap.classList.add('expanded'); }
    setBar(v.barId, 'playing');
  }

  if (e.data === YT_STATE.PAUSED) {
    if (wrap) wrap.classList.remove('expanded');
    setBar(v.barId, 'paused');
  }

  if (e.data === YT_STATE.ENDED) {
    if (wrap) wrap.classList.remove('expanded');
    setBar(v.barId, 'idle');
  }
}

function handleClick(playerId, wrapId, skelId, barId) {
  const player = players[playerId];
  const skel   = document.getElementById(skelId);
  if (!player || typeof player.getPlayerState !== 'function') return;
  if (player.getPlayerState() === YT_STATE.PLAYING) {
    player.pauseVideo();
  } else {
    if (skel) skel.classList.add('loading');
    setBar(barId, 'buffering');
    player.unMute(); player.setVolume(100); player.playVideo();
  }
}

function setBar(barId, state) {
  const bar = document.getElementById(barId);
  if (bar) bar.className = 'video-status-bar vsb-' + state;
}

function toggleChat() {
  const box = document.getElementById('chatBox');
  const btn = document.getElementById('chatBtn');
  if (!box) return;
  box.classList.toggle('active');
  btn.textContent = box.classList.contains('active') ? 'CLOSE' : 'MSG';
}
</script>
