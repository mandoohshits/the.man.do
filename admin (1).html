<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE.MAN.DO — Control Room</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0f0f0f;--surface:#171717;--surface2:#1e1e1e;--border:#2a2a2a;--text:#f0ece0;--muted:#888;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
input,textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s;}
input:focus,textarea:focus,select:focus{border-color:#555;}
input::placeholder,textarea::placeholder{color:#555;}
select option{background:#1a1a1a;}
label{font-size:0.72rem;color:var(--muted);display:block;margin-bottom:5px;font-weight:500;}
.field{margin-bottom:1rem;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;}
.btn{padding:9px 18px;border-radius:6px;font-size:0.8rem;font-weight:500;cursor:pointer;transition:all 0.15s;border:none;font-family:'DM Sans',sans-serif;}
.btn-primary{background:var(--text);color:#111;}
.btn-primary:hover{opacity:0.88;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:#555;color:var(--text);}
.btn-danger{background:none;border:1px solid rgba(220,80,60,0.25);color:rgba(220,80,60,0.7);}
.btn-danger:hover{background:rgba(220,80,60,0.08);}
.btn-sm{padding:5px 12px;font-size:0.75rem;}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-card{width:100%;max-width:360px;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.12em;margin-bottom:0.25rem;}
.login-sub{font-size:0.75rem;color:var(--muted);margin-bottom:2rem;}
.login-err{font-size:0.75rem;color:rgba(220,80,60,0.8);display:none;margin-bottom:0.75rem;}
#app{display:none;height:100vh;flex-direction:column;}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.25rem;gap:1rem;flex-shrink:0;}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.12em;}
.topbar-logo span{color:#444;}
.topbar-spacer{flex:1;}
.topbar-user{font-size:0.75rem;color:var(--muted);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.sidebar-section{padding:1rem 0.75rem 0.5rem;}
.sidebar-label{font-size:0.62rem;font-weight:600;color:#444;letter-spacing:0.08em;text-transform:uppercase;padding:0 0.5rem;margin-bottom:0.35rem;}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:7px 10px;border-radius:6px;border:none;background:none;color:var(--muted);font-size:0.82rem;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;transition:all 0.15s;}
.nav-btn:hover{background:var(--surface2);color:var(--text);}
.nav-btn.active{background:var(--surface2);color:var(--text);}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.nav-count{margin-left:auto;font-size:0.65rem;background:var(--surface2);padding:1px 6px;border-radius:10px;color:#555;}
.main{flex:1;overflow-y:auto;padding:1.75rem 2rem;max-width:820px;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.06em;margin-bottom:0.2rem;}
.page-sub{font-size:0.78rem;color:var(--muted);margin-bottom:1.5rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:0.85rem;font-weight:600;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.card-title-dot{width:7px;height:7px;border-radius:50%;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem;margin-bottom:1.25rem;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;margin-bottom:3px;}
.stat-lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.table{width:100%;border-collapse:collapse;}
.table th{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;padding:0.5rem 0.75rem;text-align:left;border-bottom:1px solid var(--border);}
.table td{padding:0.7rem 0.75rem;border-bottom:1px solid #1a1a1a;font-size:0.82rem;vertical-align:middle;}
.table tr:last-child td{border-bottom:none;}
.table tr:hover td{background:var(--surface2);}
.table-title{font-weight:500;}
.table-meta{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:0.62rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px;}
.badge-live{background:rgba(80,200,100,0.12);color:rgba(80,200,100,0.9);}
.badge-draft{background:rgba(240,160,20,0.1);color:rgba(240,160,20,0.8);}
.badge-secret{background:rgba(180,120,255,0.1);color:rgba(180,120,255,0.8);}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.form-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-bottom:1rem;}
.form-panel-hdr{font-size:0.82rem;font-weight:600;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);}
.form-actions{display:flex;gap:0.5rem;margin-top:1rem;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.color-opt.selected{border-color:var(--text);transform:scale(1.15);}
.msg-item{padding:0.85rem 0;border-bottom:1px solid #1a1a1a;}
.msg-item:last-child{border-bottom:none;}
.msg-text{font-size:0.82rem;line-height:1.6;margin-bottom:4px;}
.msg-meta{font-size:0.68rem;color:var(--muted);}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#111;padding:10px 18px;border-radius:6px;font-size:0.78rem;font-weight:500;transform:translateY(60px);opacity:0;transition:all 0.3s;z-index:9999;}
.toast.show{transform:translateY(0);opacity:1;}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:0.82rem;}
code{font-family:'Space Mono',monospace;font-size:0.72rem;background:var(--surface2);padding:2px 6px;border-radius:3px;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">THE.MAN.DO</div>
    <div class="login-sub">Control Room — Admin Only</div>
    <div class="login-err" id="loginErr">Wrong credentials.</div>
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@themando.com"></div>
    <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"></div>
    <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">Enter →</button>
  </div>
</div>

<div id="app" style="display:none;height:100vh;flex-direction:column;">
  <div class="topbar">
    <div class="topbar-logo">THE<span>.</span>MAN<span>.</span>DO</div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user" id="topUser"></div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">Log out</button>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Overview</div>
        <button class="nav-btn active" onclick="nav('home',this)"><div class="nav-dot" style="background:#555"></div>Dashboard</button>
        <button class="nav-btn" onclick="nav('messages',this)"><div class="nav-dot" style="background:rgba(60,140,255,0.8)"></div>Messages<span class="nav-count" id="msgCount">0</span></button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Portals</div>
        <button class="nav-btn" onclick="nav('dj',this)"><div class="nav-dot" style="background:rgba(180,120,255,0.8)"></div>DJ Sets<span class="nav-count" id="djCount">0</span></button>
        <button class="nav-btn" onclick="nav('things',this)"><div class="nav-dot" style="background:rgba(80,200,100,0.8)"></div>Things<span class="nav-count" id="thingsCount">0</span></button>
        <button class="nav-btn" onclick="nav('earth',this)"><div class="nav-dot" style="background:rgba(60,140,255,0.8)"></div>Earth<span class="nav-count" id="earthCount">0</span></button>
        <button class="nav-btn" onclick="nav('lab',this)"><div class="nav-dot" style="background:rgba(240,160,20,0.8)"></div>Lab<span class="nav-count" id="labCount">0</span></button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Content</div>
        <button class="nav-btn" onclick="nav('blog',this)"><div class="nav-dot" style="background:rgba(220,100,160,0.8)"></div>Blog / Stories<span class="nav-count" id="blogCount">0</span></button>
        <button class="nav-btn" onclick="nav('events',this)"><div class="nav-dot" style="background:rgba(240,160,20,0.8)"></div>Events<span class="nav-count" id="eventsCount">0</span></button>
        <button class="nav-btn" onclick="nav('secret',this)"><div class="nav-dot" style="background:rgba(180,120,255,0.8)"></div>Secret Pages<span class="nav-count" id="secretCount">0</span></button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Site</div>
        <button class="nav-btn" onclick="nav('portals',this)"><div class="nav-dot" style="background:#555"></div>Manage Portals</button>
        <button class="nav-btn" onclick="nav('settings',this)"><div class="nav-dot" style="background:#555"></div>Settings</button>
      </div>
    </div>
    <div class="main" id="mainArea"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_EMAIL='amaljithkv2405@gmail.com';
const ADMIN_PASSWORD='Naomibaby123@';

const S={get:(k)=>{try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),del:(k)=>localStorage.removeItem(k)};
const getList=(k)=>S.get(k)||[];
const saveList=(k,v)=>S.set(k,v);
const addItem=(k,item)=>{const l=getList(k);l.unshift({...item,id:Date.now(),date:new Date().toISOString()});saveList(k,l);};
const delItem=(k,id)=>saveList(k,getList(k).filter(i=>i.id!==id));

function doLogin(){
  const e=document.getElementById('loginEmail').value.trim();
  const p=document.getElementById('loginPass').value;
  if(e===ADMIN_EMAIL&&p===ADMIN_PASSWORD){sessionStorage.setItem('auth','1');sessionStorage.setItem('user',e);showApp();}
  else document.getElementById('loginErr').style.display='block';
}
['loginEmail','loginPass'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();}));
function doLogout(){sessionStorage.clear();document.getElementById('app').style.display='none';document.getElementById('loginScreen').style.display='flex';document.getElementById('loginPass').value='';}
function showApp(){
  document.getElementById('loginScreen').style.display='none';
  const app=document.getElementById('app');app.style.display='flex';
  document.getElementById('topUser').textContent=sessionStorage.getItem('user')||'';
  updateCounts();nav('home',document.querySelector('.nav-btn'));
}
if(sessionStorage.getItem('auth')==='1')showApp();

function updateCounts(){
  ['dj','things','earth','lab','blog','events','secret'].forEach(k=>{const el=document.getElementById(k+'Count');if(el)el.textContent=getList('tmdo_'+k).length;});
  document.getElementById('msgCount').textContent=getList('tmdo_messages').length;
}

let currentPage='home';
function nav(page,btn){
  currentPage=page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const pages={home:renderHome,dj:renderDJ,things:renderThings,earth:renderEarth,lab:renderLab,blog:renderBlog,events:renderEvents,secret:renderSecret,messages:renderMessages,portals:renderPortals,settings:renderSettings};
  document.getElementById('mainArea').innerHTML='';
  (pages[page]||renderHome)();updateCounts();
}

function toast(msg,dur=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function emptyState(msg){return`<div class="empty"><div style="font-size:1.5rem;opacity:0.15;margin-bottom:0.5rem;">○</div>${msg}</div>`;}
function statusBadge(s){if(s==='live')return'<span class="badge badge-live"><span class="badge-dot"></span>Live</span>';if(s==='secret')return'<span class="badge badge-secret"><span class="badge-dot"></span>Secret</span>';return'<span class="badge badge-draft"><span class="badge-dot"></span>Draft</span>';}
function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function del(key,id){if(!confirm('Delete this item?'))return;delItem(key,id);toast('Deleted.');nav(currentPage,document.querySelector('.nav-btn.active'));}

function renderHome(){
  const allPosts=['dj','things','earth','lab','blog','events','secret'].reduce((a,k)=>a+getList('tmdo_'+k).length,0);
  const recent=[];['dj','things','earth','lab','blog','events'].forEach(k=>getList('tmdo_'+k).forEach(i=>recent.push({...i,_s:k})));
  recent.sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('mainArea').innerHTML=`
  <div class="page-title">Dashboard</div><div class="page-sub">Welcome back.</div>
  <div class="stats">
    <div class="stat"><div class="stat-num">${allPosts}</div><div class="stat-lbl">Total posts</div></div>
    <div class="stat"><div class="stat-num">${getList('tmdo_portals').length+4}</div><div class="stat-lbl">Portals</div></div>
    <div class="stat"><div class="stat-num">${getList('tmdo_messages').length}</div><div class="stat-lbl">Messages</div></div>
    <div class="stat"><div class="stat-num">${getList('tmdo_dj').filter(p=>p.status==='live').length}</div><div class="stat-lbl">Live sets</div></div>
  </div>
  <div class="card"><div class="card-title"><div class="card-title-dot" style="background:#555"></div>Recent activity</div>
  ${recent.length===0?emptyState('Nothing posted yet — pick a section from the sidebar.'):`<table class="table"><thead><tr><th>Title</th><th>Section</th><th>Status</th><th>Date</th></tr></thead><tbody>${recent.slice(0,8).map(i=>`<tr><td class="table-title">${i.title||i.name||'Untitled'}</td><td style="color:var(--muted);font-size:0.75rem;text-transform:uppercase;">${i._s}</td><td>${statusBadge(i.status||'draft')}</td><td style="color:var(--muted);font-size:0.72rem;">${fmtDate(i.date)}</td></tr>`).join('')}</tbody></table>`}
  </div>
  <div class="card"><div class="card-title">Quick actions</div><div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
    <button class="btn btn-ghost btn-sm" onclick="nav('dj',null)">+ DJ Set</button>
    <button class="btn btn-ghost btn-sm" onclick="nav('things',null)">+ Video</button>
    <button class="btn btn-ghost btn-sm" onclick="nav('earth',null)">+ Photo/Place</button>
    <button class="btn btn-ghost btn-sm" onclick="nav('blog',null)">+ Story</button>
    <button class="btn btn-ghost btn-sm" onclick="nav('events',null)">+ Event</button>
    <button class="btn btn-ghost btn-sm" onclick="nav('secret',null)">+ Secret Page</button>
    <button class="btn btn-ghost btn-sm" onclick="nav('portals',null)">+ New Portal</button>
  </div></div>`;
}

function renderDJ(){
  const posts=getList('tmdo_dj');
  document.getElementById('mainArea').innerHTML=`
  <div class="page-title">DJ Sets</div><div class="page-sub">Upload and manage your audio sets.</div>
  <div class="form-panel"><div class="form-panel-hdr">Add new set</div>
    <div class="field"><label>Title</label><input id="dj_title" placeholder="e.g. CRISPY SKY VOL. 4"></div>
    <div class="row3">
      <div class="field"><label>Vibe</label><select id="dj_vibe"><option>Psychedelic</option><option>Crispy Sky</option><option>Memento</option><option>Rocket Festival</option><option>Ambient</option><option>Dark</option><option>Live</option><option>Other</option></select></div>
      <div class="field"><label>Duration</label><input id="dj_dur" placeholder="2h 14m"></div>
      <div class="field"><label>Year</label><input id="dj_year" placeholder="2024"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Track count</label><input id="dj_tracks" placeholder="12 tracks"></div>
      <div class="field"><label>Status</label><select id="dj_status"><option value="live">Live</option><option value="draft">Draft</option></select></div>
    </div>
    <div class="field"><label>Audio URL (archive.org or direct mp3)</label><input id="dj_url" placeholder="https://archive.org/download/.../set.mp3"></div>
    <div class="field"><label>Description</label><textarea id="dj_desc" rows="2" placeholder="Recorded live — Desert Edition..."></textarea></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveDJ()">Save set</button>
      <button class="btn btn-ghost" onclick="exportDJ()">Export dj.html →</button>
    </div>
  </div>
  <div class="card"><div class="card-title"><div class="card-title-dot" style="background:rgba(180,120,255,0.8)"></div>All sets (${posts.length})</div>
  ${posts.length===0?emptyState('No sets yet.'):`<table class="table"><thead><tr><th>Title</th><th>Vibe</th><th>Duration</th><th>Status</th><th>Date</th><th></th></tr></thead><tbody>${posts.map(p=>`<tr><td><div class="table-title">${p.title}</div><div class="table-meta">${p.tracks||''}</div></td><td style="color:var(--muted);font-size:0.78rem;">${p.vibe}</td><td style="color:var(--muted);font-size:0.78rem;">${p.duration||'—'}</td><td>${statusBadge(p.status)}</td><td style="color:var(--muted);font-size:0.72rem;">${fmtDate(p.date)}</td><td><button class="btn btn-danger btn-sm" onclick="del('tmdo_dj',${p.id})">Delete</button></td></tr>`).join('')}</tbody></table>`}
  </div>`;
}
function saveDJ(){const title=v('dj_title');if(!title){toast('Add a title');return;}addItem('tmdo_dj',{title,vibe:v('dj_vibe'),duration:v('dj_dur'),year:v('dj_year'),tracks:v('dj_tracks'),status:v('dj_status'),url:v('dj_url'),desc:v('dj_desc')});toast('Set saved!');nav('dj',null);}

function renderThings(){
  const posts=getList('tmdo_things');
  document.getElementById('mainArea').innerHTML=`
  <div class="page-title">Things</div><div class="page-sub">Videos, vlogs, and moving images.</div>
  <div class="form-panel"><div class="form-panel-hdr">Add new video</div>
    <div class="field"><label>Title</label><input id="th_title" placeholder="e.g. NOWHERE IN PARTICULAR — EP. 8"></div>
    <div class="row3">
      <div class="field"><label>Category</label><select id="th_cat"><option>Vlog</option><option>Film</option><option>Raw</option><option>Travel</option><option>Night</option><option>Other</option></select></div>
      <div class="field"><label>Duration</label><input id="th_dur" placeholder="22:40"></div>
      <div class="field"><label>Status</label><select id="th_status"><option value="live">Live</option><option value="draft">Draft</option></select></div>
    </div>
    <div class="field"><label>Video URL (Vimeo or direct link)</label><input id="th_url" placeholder="https://vimeo.com/..."></div>
    <div class="field"><label>Description</label><textarea id="th_desc" rows="2" placeholder="What's this about..."></textarea></div>
    <div class="form-actions"><button class="btn btn-primary" onclick="saveThings()">Save video</button></div>
  </div>
  <div class="card"><div class="card-title"><div class="card-title-dot" style="background:rgba(80,200,100,0.8)"></div>All videos (${posts.length})</div>
  ${posts.length===0?emptyState('No videos yet.'):`<table class="table"><thead><tr><th>Title</th><th>Category</th><th>Duration</th><th>Status</th><th>Date</th><th></th></tr></thead><tbody>${posts.map(p=>`<tr><td><div class="table-title">${p.title}</div></td><td style="color:var(--muted);font-size:0.78rem;">${p.category||'—'}</td><td style="color:var(--muted);font-size:0.78rem;">${p.duration||'—'}</td><td>${statusBadge(p.status)}</td><td style="color:var(--muted);font-size:0.72rem;">${fmtDate(p.date)}</td><td><button class="btn btn-danger btn-sm" onclick="del('tmdo_things',${p.id})">Delete</button></td></tr>`).join('')}</tbody></table>`}
  </div>`;
}
function saveThings(){const title=v('th_title');if(!title){toast('Add a title');return;}addItem('tmdo_things',{title,category:v('th_cat'),duration:v('th_dur'),status:v('th_status'),url:v('th_url'),desc:v('th_desc')});toast('Video saved!');nav('things',null);}

function renderEarth(){
  const posts=getList('tmdo_earth');
  document.getElementById('mainArea').innerHTML=`
  <div class="page-title">Earth</div><div class="page-sub">Photos, places, and coordinates.</div>
  <div class="form-panel"><div class="form-panel-hdr">Add new place / photo</div>
    <div class="row2">
      <div class="field"><label>Place name</label><input id="ea_name" placeholder="e.g. EMPTY QUARTER — DAWN"></div>
      <div class="field"><label>Type</label><select id="ea_type"><option>Desert</option><option>City</option><option>Mountain</option><option>Water</option><option>Forest</option><option>Other</option></select></div>
    </div>
    <div class="row2">
      <div class="field"><label>Latitude</label><input id="ea_lat" placeholder="25.2048"></div>
      <div class="field"><label>Longitude</label><input id="ea_lng" placeholder="55.2708"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Photo URL</label><input id="ea_url" placeholder="https://..."></div>
      <div class="field"><label>Frame count</label><input id="ea_frames" placeholder="14 frames"></div>
    </div>
