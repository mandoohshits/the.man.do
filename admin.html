<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE.MAN.DO — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#09080e;color:#f0ece0;font-family:'DM Sans',sans-serif;min-height:100vh;}

  /* ── SHARED ── */
  .mono{font-family:'Space Mono',monospace;}
  .bebas{font-family:'Bebas Neue',sans-serif;}

  input,textarea,select{
    width:100%;background:rgba(240,236,224,0.04);
    border:0.5px solid rgba(240,236,224,0.12);
    border-radius:3px;padding:10px 14px;
    color:#f0ece0;font-family:'DM Sans',sans-serif;font-size:0.85rem;
    outline:none;transition:border-color 0.2s;
  }
  input:focus,textarea:focus,select:focus{border-color:rgba(240,236,224,0.4);}
  input::placeholder,textarea::placeholder{color:rgba(240,236,224,0.25);}
  select option{background:#1a1520;color:#f0ece0;}
  label{font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:0.35em;
    text-transform:uppercase;color:rgba(240,236,224,0.35);display:block;margin-bottom:6px;}

  .field{margin-bottom:1.25rem;}

  .btn-primary{
    width:100%;padding:12px;border:none;border-radius:3px;
    background:#f0ece0;color:#09080e;
    font-family:'Space Mono',monospace;font-size:0.7rem;letter-spacing:0.2em;
    text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;
  }
  .btn-primary:hover{opacity:0.85;}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;}

  .btn-ghost{
    padding:8px 16px;border:0.5px solid rgba(240,236,224,0.15);border-radius:3px;
    background:none;color:rgba(240,236,224,0.5);
    font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:0.15em;
    text-transform:uppercase;cursor:pointer;transition:all 0.2s;
  }
  .btn-ghost:hover{border-color:rgba(240,236,224,0.35);color:#f0ece0;}

  /* ── LOGIN SCREEN ── */
  #loginScreen{
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:2rem;
  }
  .login-eye{
    width:80px;height:80px;border:1px solid rgba(240,236,224,0.1);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    margin-bottom:2rem;animation:slowspin 20s linear infinite;
  }
  .login-eye::before{content:'';position:absolute;width:56px;height:56px;border:1px solid rgba(240,236,224,0.05);border-radius:50%;}
  .login-dot{width:9px;height:9px;background:#f0ece0;border-radius:50%;animation:slowspin 20s linear infinite reverse;}
  @keyframes slowspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  .login-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:0.15em;margin-bottom:0.3rem;}
  .login-sub{font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:0.4em;
    color:rgba(240,236,224,0.3);text-transform:uppercase;margin-bottom:2.5rem;}

  .login-box{width:100%;max-width:360px;}
  .login-error{
    font-family:'Space Mono',monospace;font-size:0.62rem;
    color:rgba(220,80,60,0.85);text-align:center;margin-bottom:1rem;
    display:none;letter-spacing:0.05em;
  }

  /* ── DASHBOARD ── */
  #dashboard{display:none;}

  .topbar{
    border-bottom:0.5px solid rgba(240,236,224,0.08);
    padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;
  }
  .topbar-brand{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.15em;}
  .topbar-brand span{color:rgba(240,236,224,0.25);}
  .topbar-right{display:flex;align-items:center;gap:1rem;}
  .admin-tag{font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:0.3em;
    color:rgba(240,236,224,0.3);text-transform:uppercase;}

  .dash-body{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 57px);}

  /* sidebar */
  .sidebar{border-right:0.5px solid rgba(240,236,224,0.06);padding:1.5rem 1rem;}
  .sidebar-label{font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:0.4em;
    color:rgba(240,236,224,0.2);text-transform:uppercase;margin-bottom:0.75rem;padding-left:0.5rem;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:0.6rem 0.75rem;
    border-radius:3px;cursor:pointer;transition:all 0.2s;margin-bottom:2px;
    font-size:0.82rem;color:rgba(240,236,224,0.45);border:none;background:none;
    width:100%;text-align:left;
  }
  .nav-item:hover{background:rgba(240,236,224,0.04);color:rgba(240,236,224,0.8);}
  .nav-item.active{background:rgba(240,236,224,0.06);color:#f0ece0;}
  .nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

  .sidebar-section{margin-top:1.5rem;}

  /* main content */
  .main{padding:2rem 2.5rem;max-width:760px;}

  .page-header{margin-bottom:2rem;}
  .page-tag{font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:0.45em;
    color:rgba(240,236,224,0.25);text-transform:uppercase;margin-bottom:0.4rem;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.08em;}

  /* ── POST FORM ── */
  .form-card{
    border:0.5px solid rgba(240,236,224,0.08);border-radius:4px;
    padding:1.5rem;margin-bottom:1.5rem;
    background:rgba(240,236,224,0.02);
  }
  .form-card-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.08em;
    margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:0.5px solid rgba(240,236,224,0.06);}

  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

  /* upload zone */
  .upload-zone{
    border:1px dashed rgba(240,236,224,0.12);border-radius:3px;
    padding:2rem;text-align:center;cursor:pointer;
    transition:all 0.2s;position:relative;
  }
  .upload-zone:hover,.upload-zone.dragover{
    border-color:rgba(240,236,224,0.35);background:rgba(240,236,224,0.03);
  }
  .upload-zone input[type=file]{
    position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
    border:none;padding:0;background:none;
  }
  .upload-icon{font-size:1.5rem;margin-bottom:0.5rem;opacity:0.4;}
  .upload-main{font-size:0.82rem;color:rgba(240,236,224,0.5);margin-bottom:0.25rem;}
  .upload-sub{font-family:'Space Mono',monospace;font-size:0.58rem;color:rgba(240,236,224,0.25);}
  .upload-filename{font-family:'Space Mono',monospace;font-size:0.65rem;
    color:rgba(180,120,255,0.8);margin-top:0.5rem;display:none;}

  /* progress */
  .progress-wrap{display:none;margin-top:1rem;}
  .progress-label{font-family:'Space Mono',monospace;font-size:0.58rem;
    color:rgba(240,236,224,0.35);margin-bottom:6px;display:flex;justify-content:space-between;}
  .progress-track{height:2px;background:rgba(240,236,224,0.08);border-radius:1px;}
  .progress-bar{height:100%;border-radius:1px;background:rgba(180,120,255,0.7);
    width:0%;transition:width 0.3s;}

  /* success toast */
  .toast{
    position:fixed;bottom:2rem;right:2rem;
    background:#f0ece0;color:#09080e;
    font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;
    padding:12px 20px;border-radius:3px;
    transform:translateY(80px);opacity:0;transition:all 0.35s;
    z-index:999;
  }
  .toast.show{transform:translateY(0);opacity:1;}

  /* posts list */
  .posts-list{display:flex;flex-direction:column;gap:0;}
  .post-row{
    display:grid;grid-template-columns:1fr auto auto;gap:1rem;align-items:center;
    padding:0.85rem 0;border-bottom:0.5px solid rgba(240,236,224,0.05);
  }
  .post-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.06em;margin-bottom:2px;}
  .post-meta{font-family:'Space Mono',monospace;font-size:0.55rem;color:rgba(240,236,224,0.25);}
  .post-badge{font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:0.2em;
    text-transform:uppercase;padding:3px 8px;border-radius:1px;}
  .badge-live{background:rgba(80,200,100,0.1);color:rgba(80,200,100,0.7);border:0.5px solid rgba(80,200,100,0.2);}
  .badge-draft{background:rgba(240,160,20,0.08);color:rgba(240,160,20,0.55);border:0.5px solid rgba(240,160,20,0.15);}
  .post-del{background:none;border:none;cursor:pointer;color:rgba(240,236,224,0.2);
    font-size:0.75rem;transition:color 0.2s;padding:4px;}
  .post-del:hover{color:rgba(220,80,60,0.7);}

  .empty-state{text-align:center;padding:3rem 1rem;border:0.5px dashed rgba(240,236,224,0.07);border-radius:4px;}
  .empty-state p{font-family:'Space Mono',monospace;font-size:0.62rem;color:rgba(240,236,224,0.2);}

  /* stats */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:2rem;}
  .stat-card{border:0.5px solid rgba(240,236,224,0.07);border-radius:4px;padding:1rem;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.05em;line-height:1;margin-bottom:4px;}
  .stat-lbl{font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:0.3em;
    color:rgba(240,236,224,0.25);text-transform:uppercase;}

  /* instructions panel */
  .info-panel{
    border:0.5px solid rgba(180,120,255,0.15);border-radius:4px;
    padding:1.25rem;margin-bottom:1.5rem;
    background:rgba(180,120,255,0.03);
  }
  .info-panel-title{font-family:'Space Mono',monospace;font-size:0.55rem;
    letter-spacing:0.35em;color:rgba(180,120,255,0.5);text-transform:uppercase;margin-bottom:0.75rem;}
  .info-step{display:flex;gap:10px;margin-bottom:0.6rem;align-items:flex-start;}
  .info-num{font-family:'Space Mono',monospace;font-size:0.6rem;
    color:rgba(180,120,255,0.4);min-width:18px;margin-top:2px;}
  .info-text{font-size:0.78rem;color:rgba(240,236,224,0.4);line-height:1.7;}
  .info-text a{color:rgba(180,120,255,0.6);text-decoration:none;}
  .info-text a:hover{color:rgba(180,120,255,0.9);}
  .info-text code{font-family:'Space Mono',monospace;font-size:0.7rem;
    background:rgba(240,236,224,0.06);padding:1px 5px;border-radius:2px;}

  /* copy button */
  .copy-row{display:flex;gap:8px;align-items:center;margin-top:0.5rem;}
  .copy-box{flex:1;font-family:'Space Mono',monospace;font-size:0.65rem;
    background:rgba(240,236,224,0.05);border:0.5px solid rgba(240,236,224,0.1);
    border-radius:3px;padding:8px 10px;color:rgba(240,236,224,0.5);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .copy-btn{padding:8px 12px;background:none;border:0.5px solid rgba(240,236,224,0.1);
    border-radius:3px;color:rgba(240,236,224,0.4);font-family:'Space Mono',monospace;
    font-size:0.55rem;cursor:pointer;white-space:nowrap;transition:all 0.2s;letter-spacing:0.1em;}
  .copy-btn:hover{border-color:rgba(240,236,224,0.3);color:#f0ece0;}
</style>
</head>
<body>

<!-- ═══════════════════════════════ LOGIN ═══════════════════════════════ -->
<div id="loginScreen">
  <div class="login-eye" style="position:relative;">
    <div class="login-dot"></div>
  </div>
  <div class="login-title">THE.MAN.DO</div>
  <div class="login-sub">Admin Access Only</div>

  <div class="login-box">
    <div class="login-error" id="loginError">Wrong email or password.</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="admin@themando.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Enter the universe →</button>
    <p style="text-align:center;margin-top:1.25rem;font-family:'Space Mono',monospace;font-size:0.55rem;color:rgba(240,236,224,0.18);letter-spacing:0.15em;">
      THIS PAGE IS NOT FOR VISITORS
    </p>
  </div>
</div>

<!-- ═══════════════════════════════ DASHBOARD ═══════════════════════════ -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">THE<span>.</span>MAN<span>.</span>DO <span>/ ADMIN</span></div>
    <div class="topbar-right">
      <span class="admin-tag" id="adminEmail"></span>
      <button class="btn-ghost" onclick="doLogout()">Log out</button>
    </div>
  </div>

  <div class="dash-body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-label">Portals</div>
      <button class="nav-item active" onclick="showSection('dj',this)">
        <div class="nav-dot" style="background:rgba(180,120,255,0.7)"></div> DJ Sets
      </button>
      <button class="nav-item" onclick="showSection('things',this)">
        <div class="nav-dot" style="background:rgba(80,200,100,0.7)"></div> Things
      </button>
      <button class="nav-item" onclick="showSection('earth',this)">
        <div class="nav-dot" style="background:rgba(60,140,255,0.7)"></div> Earth
      </button>
      <button class="nav-item" onclick="showSection('lab',this)">
        <div class="nav-dot" style="background:rgba(240,160,20,0.7)"></div> Lab
      </button>

      <div class="sidebar-section">
        <div class="sidebar-label">Site</div>
        <button class="nav-item" onclick="showSection('settings',this)">
          <div class="nav-dot" style="background:rgba(240,236,224,0.2)"></div> Settings
        </button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main" id="mainContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG — CHANGE THESE ──────────────────────────────────────────────
const ADMIN_EMAIL    = 'amaljithkv2405@gmail.com';   // ← your email
const ADMIN_PASSWORD = 'Naomibaby123@';          // ← your password
// ──────────────────────────────────────────────────────────────────────

// Simple in-browser storage for posts (persists across page reloads)
function getPosts(section){ return JSON.parse(localStorage.getItem('posts_'+section)||'[]'); }
function savePosts(section,arr){ localStorage.setItem('posts_'+section,JSON.stringify(arr)); }

// ── AUTH ──
function doLogin(){
  const e = document.getElementById('emailInput').value.trim();
  const p = document.getElementById('passInput').value;
  if(e===ADMIN_EMAIL && p===ADMIN_PASSWORD){
    sessionStorage.setItem('tmdo_auth','1');
    sessionStorage.setItem('tmdo_email',e);
    showDashboard();
  } else {
    document.getElementById('loginError').style.display='block';
  }
}
document.getElementById('passInput').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('emailInput').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

function doLogout(){
  sessionStorage.removeItem('tmdo_auth');
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('passInput').value='';
}

function showDashboard(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('adminEmail').textContent=sessionStorage.getItem('tmdo_email')||'';
  showSection('dj', document.querySelector('.nav-item'));
}

if(sessionStorage.getItem('tmdo_auth')==='1') showDashboard();

// ── NAV ──
function showSection(name, btn){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const m = document.getElementById('mainContent');
  if(name==='dj')       m.innerHTML = djSection();
  else if(name==='things')  m.innerHTML = comingSoon('Things','Upload videos & vlogs','rgba(80,200,100,0.7)');
  else if(name==='earth')   m.innerHTML = comingSoon('Earth','Upload photos & places','rgba(60,140,255,0.7)');
  else if(name==='lab')     m.innerHTML = comingSoon('Lab','Write experiments','rgba(240,160,20,0.7)');
  else if(name==='settings') m.innerHTML = settingsSection();
  attachDJHandlers();
}

// ── DJ SECTION ──
function djSection(){
  const posts = getPosts('dj');
  const stats = [
    {num: posts.length, lbl:'Total sets'},
    {num: posts.filter(p=>p.status==='live').length, lbl:'Live'},
    {num: posts.filter(p=>p.status==='draft').length, lbl:'Drafts'},
  ];
  return `
  <div class="page-header">
    <div class="page-tag">Portal — DJ</div>
    <div class="page-title">DJ SETS</div>
  </div>

  <div class="stats-row">
    ${stats.map(s=>`<div class="stat-card"><div class="stat-num">${s.num}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('')}
  </div>

  <div class="info-panel">
    <div class="info-panel-title">How to add a real audio file</div>
    <div class="info-step"><div class="info-num">01</div><div class="info-text">Go to <a href="https://archive.org/upload" target="_blank">archive.org/upload</a> — free, unlimited audio hosting</div></div>
    <div class="info-step"><div class="info-num">02</div><div class="info-text">Upload your MP3 or WAV set file. Wait for it to finish processing.</div></div>
    <div class="info-step"><div class="info-num">03</div><div class="info-text">On the item page, right-click the audio file → Copy link address → paste it in <code>Audio URL</code> below</div></div>
    <div class="info-step"><div class="info-num">04</div><div class="info-text">Fill in the form below → Save. Your set appears on the DJ page instantly.</div></div>
  </div>

  <div class="form-card">
    <div class="form-card-title">NEW DJ SET</div>
    <div class="field">
      <label>Set title</label>
      <input type="text" id="dj_title" placeholder="e.g. CRISPY SKY VOL. 4">
    </div>
    <div class="row-2">
      <div class="field">
        <label>Vibe / Category</label>
        <select id="dj_vibe">
          <option value="Psychedelic">Psychedelic</option>
          <option value="Crispy Sky">Crispy Sky</option>
          <option value="Memento">Memento</option>
          <option value="Rocket Festival">Rocket Festival</option>
          <option value="Ambient">Ambient</option>
          <option value="Dark">Dark</option>
          <option value="Live">Live</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>Duration</label>
        <input type="text" id="dj_duration" placeholder="e.g. 2h 14m">
      </div>
    </div>
    <div class="row-2">
      <div class="field">
        <label>Year</label>
        <input type="text" id="dj_year" placeholder="2024">
      </div>
      <div class="field">
        <label>Track count</label>
        <input type="text" id="dj_tracks" placeholder="e.g. 12 tracks">
      </div>
    </div>
    <div class="field">
      <label>Audio URL (from archive.org)</label>
      <input type="url" id="dj_url" placeholder="https://archive.org/download/your-set/set.mp3">
    </div>
    <div class="field">
      <label>Description (optional)</label>
      <textarea id="dj_desc" rows="2" placeholder="Recorded live — Desert Edition..."></textarea>
    </div>
    <div class="row-2">
      <div class="field">
        <label>Status</label>
        <select id="dj_status">
          <option value="live">Live (visible to everyone)</option>
          <option value="draft">Draft (hidden)</option>
        </select>
      </div>
    </div>
    <button class="btn-primary" id="djSaveBtn" onclick="saveSet()">Publish set →</button>
  </div>

  <div class="form-card-title" style="margin-bottom:1rem;">PUBLISHED SETS</div>
  <div id="djPostsList">
    ${posts.length===0
      ? `<div class="empty-state"><p>No sets yet. Add your first one above.</p></div>`
      : `<div class="posts-list">${posts.map((p,i)=>`
        <div class="post-row">
          <div>
            <div class="post-title">${p.title}</div>
            <div class="post-meta">${p.vibe} · ${p.duration} · ${p.year}</div>
          </div>
          <div class="post-badge ${p.status==='live'?'badge-live':'badge-draft'}">${p.status}</div>
          <button class="post-del" onclick="deleteSet(${i})" title="Delete">✕</button>
        </div>`).join('')}
      </div>`
    }
  </div>

  <div style="margin-top:2rem;padding-top:1.5rem;border-top:0.5px solid rgba(240,236,224,0.06);">
    <div class="page-tag" style="margin-bottom:0.75rem;">Export for your website</div>
    <p style="font-size:0.78rem;color:rgba(240,236,224,0.35);line-height:1.8;margin-bottom:1rem;">
      Click the button below to download an updated <code>dj.html</code> file with all your sets baked in. Then upload it to GitHub — your live site updates in 30 seconds.
    </p>
    <button class="btn-ghost" onclick="exportDJ()">Download updated dj.html →</button>
  </div>
  `;
}

function attachDJHandlers(){
  // drag over upload zones
  document.querySelectorAll('.upload-zone').forEach(z=>{
    z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('dragover');});
    z.addEventListener('dragleave',()=>z.classList.remove('dragover'));
  });
}

function saveSet(){
  const title    = document.getElementById('dj_title')?.value.trim();
  const vibe     = document.getElementById('dj_vibe')?.value;
  const duration = document.getElementById('dj_duration')?.value.trim();
  const year     = document.getElementById('dj_year')?.value.trim();
  const tracks   = document.getElementById('dj_tracks')?.value.trim();
  const url      = document.getElementById('dj_url')?.value.trim();
  const desc     = document.getElementById('dj_desc')?.value.trim();
  const status   = document.getElementById('dj_status')?.value;

  if(!title){ showToast('Add a title first'); return; }

  const posts = getPosts('dj');
  posts.unshift({title,vibe,duration,year,tracks,url,desc,status,date:new Date().toISOString()});
  savePosts('dj',posts);
  showToast('Set saved! Now export & upload to go live.');
  showSection('dj', document.querySelector('.nav-item.active'));
}

function deleteSet(i){
  if(!confirm('Delete this set?')) return;
  const posts = getPosts('dj');
  posts.splice(i,1);
  savePosts('dj',posts);
  showSection('dj', document.querySelector('.nav-item.active'));
}
