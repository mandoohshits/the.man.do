  <main class="dj-hero">

    <div style="text-align:center;">
      <img src="images/MD_LOGO.png" class="logo" alt="THE.MAN.DO" style="width:80px;opacity:0.7;margin-bottom:16px;">
      <h1 style="font-family:var(--font-display);font-size:clamp(2.5rem,8vw,5rem);letter-spacing:6px;color:var(--text);margin-bottom:8px;">SOUND CORE</h1>
      <p style="font-family:var(--font-mono);font-size:0.58rem;color:var(--accent);letter-spacing:5px;text-transform:uppercase;">
        If you found this page — you were meant to hear it
      </p>
    </div>

    <div class="dj-console">

      <div class="mix-module">
        <div class="mix-info">
          <span class="mix-number">01</span>
          <span class="mix-name">RAW_SESSIONS_001</span>
        </div>
        <div class="audio-player">
          <audio controls>
            <source src="YOUR_AUDIO_LINK_HERE.mp3" type="audio/mpeg">
          </audio>
        </div>
      </div>

      <div class="mix-module">
        <div class="mix-info">
          <span class="mix-number">02</span>
          <span class="mix-name">MIDNIGHT_CORE</span>
        </div>
        <div class="audio-player">
          <audio controls>
            <source src="YOUR_AUDIO_LINK_HERE_2.mp3" type="audio/mpeg">
          </audio>
        </div>
      </div>

      <div class="mix-module">
        <div class="mix-info">
          <span class="mix-number">03</span>
          <span class="mix-name">DESERT_FREQUENCY</span>
        </div>
        <div class="audio-player">
          <audio controls>
            <source src="YOUR_AUDIO_LINK_HERE_3.mp3" type="audio/mpeg">
          </audio>
        </div>
      </div>

    </div>

  </main>

  <div class="chat-trigger" onclick="toggleChat()" id="chatBtn">MSG</div>

  <div class="chat-dock" id="chatBox">
    <div class="chat-header">
      <span>COMM_LINK_V1</span>
      <span class="chat-close" onclick="toggleChat()">[ CLOSE ]</span>
