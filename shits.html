  <style>
    .shits-feed{display:flex;flex-direction:column;align-items:center;gap:70px;padding:60px 5% 100px;}
    .video-post{width:100%;max-width:720px;display:flex;flex-direction:column;}
    .video-wrap{position:relative;border-radius:16px 16px 0 0;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,0.07);border-bottom:none;aspect-ratio:16/9;}
    .video-wrap iframe{width:100%;height:100%;display:block;border:none;}
    .video-skeleton{position:absolute;inset:0;background:#080808;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:5;transition:opacity 0.5s;pointer-events:none;}
    .video-skeleton.hidden{opacity:0;}
    .skeleton-title{font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:6px;color:#f0a014;text-transform:uppercase;opacity:0.5;}
    .skeleton-dots{display:flex;gap:5px;}
    .skeleton-dot{width:5px;height:5px;border-radius:50%;background:#f0a014;}
    .skeleton-dot:nth-child(1){animation:dotPulse 1s ease-in-out infinite 0s;}
    .skeleton-dot:nth-child(2){animation:dotPulse 1s ease-in-out infinite 0.2s;}
    .skeleton-dot:nth-child(3){animation:dotPulse 1s ease-in-out infinite 0.4s;}
    @keyframes dotPulse{0%,100%{opacity:0.15;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}
    .video-status-bar{background:rgba(6,6,6,0.97);border:1px solid rgba(255,255,255,0.07);border-top:1px solid rgba(240,160,20,0.06);border-radius:0 0 16px 16px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:42px;}
    .status-left{display:flex;align-items:center;gap:10px;}
    .buf-dots{display:flex;gap:3px;}
    .buf-dot{width:4px;height:4px;border-radius:50%;background:#f0a014;opacity:0.15;transition:opacity 0.3s;}
    .vsb-buffering .buf-dot:nth-child(1){animation:dotPulse 1s ease-in-out infinite 0s;opacity:1;}
    .vsb-buffering .buf-dot:nth-child(2){animation:dotPulse 1s ease-in-out infinite 0.2s;opacity:1;}
    .vsb-buffering .buf-dot:nth-child(3){animation:dotPulse 1s ease-in-out infinite 0.4s;opacity:1;}
    .vsb-buffering .buf-text{opacity:1;}
    .vsb-buffering .ready-text{opacity:0;}
    .vsb-buffering .waveform-mini{opacity:0;}
    .vsb-ready .buf-dot{opacity:0.1;animation:none!important;}
    .vsb-ready .buf-text{opacity:0;}
    .vsb-ready .ready-text{opacity:0.8;}
    .vsb-ready .waveform-mini{opacity:1;}
    .vsb-idle .buf-dot{opacity:0.1;animation:none!important;}
    .vsb-idle .buf-text{opacity:0.2;}
    .vsb-idle .ready-text{opacity:0;}
    .vsb-idle .waveform-mini{opacity:0;}
    .buf-text,.ready-text{font-family:'Space Mono',monospace;font-size:0.52rem;letter-spacing:2px;text-transform:uppercase;transition:opacity 0.4s;white-space:nowrap;}
    .buf-text{color:#f0a014;}
    .ready-text{color:rgba(80,200,100,0.9);}
    .waveform-mini{display:flex;align-items:flex-end;gap:2px;height:14px;opacity:0;transition:opacity 0.4s;}
    .waveform-mini span{width:2px;border-radius:1px;background:#f0a014;animation:waveBar 0.9s ease-in-out infinite alternate;}
    .waveform-mini span:nth-child(1){height:4px;animation-delay:0s;}
    .waveform-mini span:nth-child(2){height:11px;animation-delay:0.12s;}
    .waveform-mini span:nth-child(3){height:6px;animation-delay:0.24s;}
    .waveform-mini span:nth-child(4){height:13px;animation-delay:0.06s;}
    .waveform-mini span:nth-child(5){height:5px;animation-delay:0.18s;}
    @keyframes waveBar{from{transform:scaleY(0.3);opacity:0.4;}to{transform:scaleY(1);opacity:1;}}
    .status-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
    .video-post-title{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:2px;color:#f0ece0;text-transform:uppercase;}
    .video-post-meta{font-family:'Space Mono',monospace;font-size:0.48rem;letter-spacing:1px;color:rgba(240,236,224,0.25);text-transform:uppercase;}
  </style>

<script>
function iframeLoaded(skelId, barId) {
  const skel = document.getElementById(skelId);
  const bar  = document.getElementById(barId);
  if (skel) skel.classList.add('hidden');
  if (bar) {
    bar.className = 'video-status-bar vsb-ready';
    setTimeout(() => { bar.className = 'video-status-bar vsb-idle'; }, 3000);
  }
}

function toggleChat() {
  const chatBox = document.getElementById('chatBox');
  const chatBtn = document.getElementById('chatBtn');
  if (!chatBox) return;
  chatBox.classList.toggle('active');
  chatBtn.textContent = chatBox.classList.contains('active') ? 'CLOSE' : 'MSG';
}
</script>
